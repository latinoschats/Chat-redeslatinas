<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Registro Web</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f4f4; }
        form { background: #fff; padding: 20px; max-width: 400px; margin: auto; border-radius: 5px; }
        input, textarea { width: 100%; padding: 8px; margin: 8px 0; }
        button { background: #28a745; color: white; padding: 10px; border: none; cursor: pointer; }
        button:hover { background: #218838; }
    </style>
</head>
<body>
    <form action="procesar_registro.php" method="POST">
        <h2>Formulario de Registro</h2>
        <label>Nombre *</label>
        <input type="text" name="nombre" required>

        <label>Email *</label>
        <input type="email" name="email" required>

        <label>Teléfono</label>
        <input type="tel" name="telefono">

        <label>Mensaje</label>
        <textarea name="mensaje" rows="4"></textarea>

        <button type="submit">Enviar Registro</button>
    </form>
</body>
</html>
